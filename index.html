<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodokmen — fáze 1: datový model</title>
<style>
  :root{
    --papir:#faf6ee; --tmava:#3a3128; --linka:#c9bfa8; --akcent:#8a6d4b;
    --muz:#5c7a99; --zena:#a8677c;
  }
  *{box-sizing:border-box;}
  body{
    font-family:"Georgia","Times New Roman",serif;
    background:var(--papir); color:var(--tmava);
    margin:0; padding:24px; line-height:1.5;
  }
  h1{font-size:22px; margin-bottom:4px;}
  .podtitul{color:var(--akcent); font-size:14px; margin-bottom:20px;}
  .panel{
    background:#fff; border:1px solid var(--linka); border-radius:8px;
    padding:16px 20px; margin-bottom:18px;
  }
  .panel h2{font-size:16px; margin:0 0 10px 0; border-bottom:1px solid var(--linka); padding-bottom:6px;}
  .stat{display:inline-block; margin-right:22px; font-size:14px;}
  .stat b{font-size:20px; display:block; color:var(--akcent);}
  button{
    font-family:inherit; background:var(--akcent); color:#fff; border:none;
    border-radius:6px; padding:8px 14px; cursor:pointer; font-size:13px; margin-right:8px;
  }
  button:hover{opacity:.88;}
  button.sec{background:#efe7d6; color:var(--tmava);}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:5px 8px; border-bottom:1px solid #eee;}
  th{color:var(--akcent); font-weight:normal; border-bottom:2px solid var(--linka);}
  tr:hover{background:#f8f4ea;}
  .zena-rad{border-left:3px solid var(--zena);}
  .muz-rad{border-left:3px solid var(--muz);}
  .zemrel{color:#999;}
  .pill{
    display:inline-block; font-size:11px; padding:1px 7px; border-radius:10px;
    background:#efe7d6; color:var(--akcent); margin-left:6px;
  }
  .pill.varovani{background:#f7dede; color:#a33;}
  .pill.ok{background:#dcefe0; color:#2a7a45;}
  #jsonView{
    width:100%; height:340px; font-family:monospace; font-size:12px;
    background:#2b2620; color:#e8dfca; border:none; border-radius:6px; padding:12px;
    display:none;
  }
  .kontrola-radek{padding:4px 0; font-size:13px;}
  .generace-nadpis{background:#f2ead9; font-weight:bold;}
</style>
</head>
<body>

<h1>🌳 Rodokmen — Fáze 1</h1>
<div class="podtitul">Datový model + generátor testovacích dat · podle plánu, bod 7.1 · ověření, že model unese reálné anomálie</div>

<div class="panel">
  <h2>Přehled testovacích dat</h2>
  <div id="statistiky"></div>
</div>

<div class="panel">
  <h2>Kontrola integrity modelu</h2>
  <div id="kontrolyVysledek"></div>
</div>

<div class="panel">
  <h2>Osoby (podle generace od kmene)</h2>
  <button onclick="prepniJSON()">Zobrazit / skrýt syrový JSON</button>
  <button class="sec" onclick="stahnoutJSON()">Stáhnout jako .json</button>
  <textarea id="jsonView" readonly></textarea>
  <div id="tabulkaOsob" style="margin-top:14px;"></div>
</div>

<div class="panel">
  <h2>Svazky (páry a jejich děti)</h2>
  <div id="tabulkaSvazku"></div>
</div>

<script>
/* ==========================================================
   DATOVÝ MODEL — podle rodokmen-idealni-plan.md, §3
   Rodokmen NENÍ strom, je to graf: osoby + svazky.
   Nikdy nemodelovat rodiče jako pole "children" u jedné osoby.
   ========================================================== */

function generujTestovaciData(){
  const osoby = {};
  const svazky = [];

  // pomocná funkce pro čitelnost zápisu
  function osoba(id, o){
    osoby[id] = Object.assign({
      jmeno:"", prijmeni:"", rodnePrijmeni:null,
      narozeni:{datum:null, misto:null, presnost:"rok"},
      umrti:null, pohlavi:"z", foto:null, poznamka:"", detaily:[]
    }, o);
  }
  function svazek(id, partneri, deti, extra){
    svazky.push(Object.assign({id, partneri, deti: deti||[], typ:"manželství", od:null}, extra||{}));
  }

  /* ---------- GENERACE -2 (praprarodiče kmene) ---------- */
  osoba("p001",{jmeno:"Antonín",prijmeni:"Novák",pohlavi:"m",
    narozeni:{datum:"1910",misto:"Jičín",presnost:"rok"},
    umrti:{datum:"1980",presnost:"cca"}});
  osoba("p002",{jmeno:"Božena",prijmeni:"Nováková",rodnePrijmeni:"Malá",pohlavi:"z",
    narozeni:{datum:"1912",misto:"Jičín",presnost:"rok"},
    umrti:{datum:"1975",presnost:"rok"}});
  osoba("p003",{jmeno:"Karel",prijmeni:"Novák",pohlavi:"m",
    narozeni:{datum:"1908",misto:"Jičín",presnost:"rok"},
    umrti:{datum:"1944",presnost:"cca"}, poznamka:"Padl na frontě, přesné datum neznámé."});
  osoba("p004",{jmeno:"Marie",prijmeni:"Černá",rodnePrijmeni:"Nováková",pohlavi:"z",
    narozeni:{datum:"1915",misto:null,presnost:"rok"}, umrti:null});
  svazek("s001",["p001","p002"],["p013","p014"]);

  osoba("p005",{jmeno:"Jan",prijmeni:"Dvořák",pohlavi:"m",
    narozeni:{datum:null,misto:"Turnov",presnost:"cca"}, umrti:null,
    poznamka:"Datum narození ani úmrtí se nepodařilo dohledat — jen odhad podle věku dcery."});
  osoba("p006",{jmeno:"Anna",prijmeni:"Dvořáková",rodnePrijmeni:"Veselá",pohlavi:"z",
    narozeni:{datum:"1908",misto:"Turnov",presnost:"cca"},
    umrti:{datum:"1990",presnost:"rok"}});
  svazek("s002",["p005","p006"],["p015","p016","p017"]);

  osoba("p007",{jmeno:"Karel",prijmeni:"Svoboda",pohlavi:"m",
    narozeni:{datum:"1908",misto:null,presnost:"rok"},
    umrti:{datum:"1970",presnost:"cca"}});
  osoba("p008",{jmeno:"Milada",prijmeni:"Svobodová",rodnePrijmeni:"Holá",pohlavi:"z",
    narozeni:{datum:"1910",misto:null,presnost:"rok"},
    umrti:{datum:"1995",presnost:"rok"}});
  osoba("p009",{jmeno:"Bohumil",prijmeni:"Svoboda",pohlavi:"m",
    narozeni:{datum:"1912",misto:null,presnost:"rok"},
    umrti:{datum:"1980",presnost:"rok"}});
  svazek("s003",["p007","p008"],["p018"]);
  // pozn.: Bohumil Svoboda (p009) je sourozenec Františka, ne jeho dítě —
  // do svazku s003 tedy nepatří, zůstává v datech jako osoba bez zapsaného svazku (testuje bod 5 kontroly).

  osoba("p010",{jmeno:"Rudolf",prijmeni:"Procházka",pohlavi:"m",
    narozeni:{datum:"1912",misto:"Náchod",presnost:"rok"},
    umrti:{datum:"1988",presnost:"rok"}});
  osoba("p011",{jmeno:"Zdeňka",prijmeni:"Procházková",rodnePrijmeni:"Bartošová",pohlavi:"z",
    narozeni:{datum:"1918",misto:"Náchod",presnost:"rok"}, umrti:null,
    poznamka:"Datum ani okolnosti úmrtí neznáme — možná ještě žije, věkem nepravděpodobné, nutno ověřit v matrice."});
  osoba("p012",{jmeno:"Alois",prijmeni:"Procházka",pohlavi:"m",
    narozeni:{datum:"1915",misto:"Náchod",presnost:"rok"},
    umrti:{datum:"1943",presnost:"rok"}, poznamka:"Padl za 2. světové války."});
  svazek("s004",["p010","p011"],["p019","p020"]);

  /* ---------- GENERACE -1 (rodiče kmene, + jejich sourozenci) ---------- */
  osoba("p013",{jmeno:"Josef",prijmeni:"Novák",pohlavi:"m",
    narozeni:{datum:"1938-03-12",misto:"Jičín",presnost:"den"},
    umrti:{datum:"2015-11-02",presnost:"den"}});
  osoba("p014",{jmeno:"Vlasta",prijmeni:"Kratochvílová",rodnePrijmeni:"Nováková",pohlavi:"z",
    narozeni:{datum:"1936",misto:"Jičín",presnost:"rok"}, umrti:null});

  osoba("p015",{jmeno:"Marie",prijmeni:"Dvořáková",pohlavi:"z",
    narozeni:{datum:"1940",misto:"Turnov",presnost:"cca"},
    umrti:{datum:"2019",presnost:"rok"}});
  osoba("p016",{jmeno:"Anna",prijmeni:"Malinová",rodnePrijmeni:"Dvořáková",pohlavi:"z",
    narozeni:{datum:"1937",misto:"Turnov",presnost:"rok"}, umrti:null});
  osoba("p017",{jmeno:"Karel",prijmeni:"Dvořák",pohlavi:"m",
    narozeni:{datum:"1943",misto:"Turnov",presnost:"rok"},
    umrti:{datum:"1998",presnost:"rok"}});

  osoba("p018",{jmeno:"František",prijmeni:"Svoboda",pohlavi:"m",
    narozeni:{datum:"1935-07-04",misto:"Náchod",presnost:"den"},
    umrti:{datum:"2020-01-19",presnost:"den"}});

  osoba("p019",{jmeno:"Věra",prijmeni:"Svobodová",rodnePrijmeni:"Procházková",pohlavi:"z",
    narozeni:{datum:"1942-09-30",misto:"Náchod",presnost:"den"}, umrti:null});
  osoba("p020",{jmeno:"Miloslava",prijmeni:"Doležalová",rodnePrijmeni:"Procházková",pohlavi:"z",
    narozeni:{datum:"1945",misto:"Náchod",presnost:"cca"}, umrti:null});

  // ANOMÁLIE: první manželství Josefa Nováka (rozvod) — nevlastní bratr Pavla
  osoba("p021",{jmeno:"Ludmila",prijmeni:"Nováková",rodnePrijmeni:null,pohlavi:"z",
    narozeni:{datum:"1940",misto:null,presnost:"cca"}, umrti:null,
    poznamka:"Rodné příjmení se nepodařilo dohledat."});
  osoba("p022",{jmeno:"Petr",prijmeni:"Novák",pohlavi:"m",
    narozeni:{datum:"1962",misto:"Jičín",presnost:"rok"}, umrti:null,
    poznamka:"Nevlastní bratr Pavla Nováka z prvního manželství Josefa."});
  svazek("s005",["p013","p021"],["p022"],{typ:"manželství (rozvedeno)", od:"1961"});

  // druhé manželství Josefa — rodiče kmene "Pavel" větve
  svazek("s006",["p013","p015"],["p024"],{typ:"manželství", od:"1965"});

  svazek("s007",["p018","p019"],["p023"],{typ:"manželství", od:"1966"});

  /* ---------- GENERACE 0 — KOŘEN ---------- */
  osoba("p023",{jmeno:"Jana",prijmeni:"Nováková",rodnePrijmeni:"Svobodová",pohlavi:"z",
    narozeni:{datum:"1968-02-14",misto:"Náchod",presnost:"den"}, umrti:null});
  osoba("p024",{jmeno:"Pavel",prijmeni:"Novák",pohlavi:"m",
    narozeni:{datum:"1966-06-01",misto:"Jičín",presnost:"den"}, umrti:null});
  svazek("s008",["p024","p023"],["p025","p026","p027","p028"],{typ:"manželství", od:"1988"});

  /* ---------- GENERACE +1 (děti kmene) ---------- */
  osoba("p025",{jmeno:"Tomáš",prijmeni:"Novák",pohlavi:"m",
    narozeni:{datum:"1990-04-11",misto:"Hradec Králové",presnost:"den"}, umrti:null});
  osoba("p026",{jmeno:"Lucie",prijmeni:"Horáková",rodnePrijmeni:"Nováková",pohlavi:"z",
    narozeni:{datum:"1993-08-22",misto:"Hradec Králové",presnost:"den"}, umrti:null});
  osoba("p027",{jmeno:"Martin",prijmeni:"Novák",pohlavi:"m",
    narozeni:{datum:"1996-01-30",misto:"Hradec Králové",presnost:"den"},
    umrti:{datum:"2020-05-17",presnost:"den"},
    poznamka:"Zemřel mladý — testovací případ pro zobrazení † u nižší generace."});
  osoba("p028",{jmeno:"Eva",prijmeni:"Nováková",pohlavi:"z",
    narozeni:{datum:"1999-12-03",misto:"Hradec Králové",presnost:"den"}, umrti:null});

  osoba("p029",{jmeno:"Barbora",prijmeni:"Nováková",rodnePrijmeni:"Kučerová",pohlavi:"z",
    narozeni:{datum:"1991",misto:null,presnost:"rok"}, umrti:null});
  svazek("s009",["p025","p029"],["p031","p032"],{typ:"manželství", od:"2016"});

  osoba("p030",{jmeno:"Petr",prijmeni:"Horák",pohlavi:"m",
    narozeni:{datum:"1990",misto:null,presnost:"rok"}, umrti:null});
  svazek("s010",["p026","p030"],["p033","p034"],{typ:"manželství", od:"2015"});

  // ANOMÁLIE: nesezdaný pár / partnerství, žádné děti — test typu svazku
  osoba("p035",{jmeno:"Jakub",prijmeni:"Král",pohlavi:"m",
    narozeni:{datum:"1997",misto:null,presnost:"rok"}, umrti:null});
  svazek("s011",["p028","p035"],[],{typ:"partnerství", od:"2021"});

  /* ---------- GENERACE +2 (vnoučata kmene) ---------- */
  osoba("p031",{jmeno:"Šimon",prijmeni:"Novák",pohlavi:"m",
    narozeni:{datum:"2019-03-08",misto:"Hradec Králové",presnost:"den"}, umrti:null});
  osoba("p032",{jmeno:"Klára",prijmeni:"Nováková",pohlavi:"z",
    narozeni:{datum:"2022-10-19",misto:"Hradec Králové",presnost:"den"}, umrti:null});
  osoba("p033",{jmeno:"Anežka",prijmeni:"Horáková",pohlavi:"z",
    narozeni:{datum:"2018-06-25",misto:"Hradec Králové",presnost:"den"}, umrti:null});
  osoba("p034",{jmeno:"Matyáš",prijmeni:"Horák",pohlavi:"m",
    narozeni:{datum:"2021-02-14",misto:"Hradec Králové",presnost:"den"}, umrti:null});

  return {
    meta:{ verze:1, nazev:"Testovací rodina — Novákovi/Svobodovi (fáze 1)",
           koren:"s008", upraveno: new Date().toISOString().slice(0,10) },
    osoby, svazky
  };
}

const data = generujTestovaciData();

/* ==========================================================
   KONTROLA INTEGRITY — validace grafu proti anomáliím
   ========================================================== */
function zkontrolujData(d){
  const vysledky = [];
  const idOsob = new Set(Object.keys(d.osoby));

  // 1) každý partner/dítě ve svazku musí existovat jako osoba
  let chybiOsoby = [];
  d.svazky.forEach(s=>{
    [...s.partneri, ...s.deti].forEach(id=>{
      if(!idOsob.has(id)) chybiOsoby.push(id+" (svazek "+s.id+")");
    });
  });
  vysledky.push({
    ok: chybiOsoby.length===0,
    text: chybiOsoby.length===0
      ? "Všechny ID v svazcích odkazují na existující osoby."
      : "Chybějící osoby: "+chybiOsoby.join(", ")
  });

  // 2) žádná osoba nemá pole "children" (kontrola proti chybnému modelu)
  let spatnyModel = Object.values(d.osoby).some(o=>o.hasOwnProperty("children")||o.hasOwnProperty("deti"));
  vysledky.push({
    ok: !spatnyModel,
    text: !spatnyModel ? "Žádná osoba nemá vlastní pole dětí — vztahy jsou správně jen přes svazky (graf, ne strom)."
                       : "CHYBA: nalezena osoba s vlastním polem dětí — to je proti modelu."
  });

  // 3) test druhého sňatku — osoba vyskytující se jako partner ve 2+ svazcích
  const pocetSvazku = {};
  d.svazky.forEach(s=> s.partneri.forEach(id=> pocetSvazku[id]=(pocetSvazku[id]||0)+1));
  const druheSnatky = Object.entries(pocetSvazku).filter(([id,n])=>n>1).map(([id])=> d.osoby[id].jmeno+" "+d.osoby[id].prijmeni);
  vysledky.push({
    ok: druheSnatky.length>0,
    text: druheSnatky.length>0
      ? "Model správně unese druhý sňatek — testováno na: "+druheSnatky.join(", ")+"."
      : "Pozor: v testovacích datech není žádný druhý sňatek — anomálie neotestována."
  });

  // 4) test neúplných dat (null datum, cca přesnost, null úmrtí u starých osob)
  const necoNeurcite = Object.values(d.osoby).filter(o=> o.narozeni.presnost==="cca" || o.narozeni.datum===null);
  vysledky.push({
    ok: necoNeurcite.length>0,
    text: necoNeurcite.length>0
      ? "Model unese neúplná/přibližná data — "+necoNeurcite.length+" osob s presnost=cca nebo bez data narození."
      : "Pozor: žádná osoba nemá neurčité datum — anomálie neotestována."
  });

  // 5) test osoby bez svazku (jen list, žádný pár) — musí to jít zobrazit samostatně
  const bezSvazku = Object.keys(d.osoby).filter(id=> !d.svazky.some(s=> s.partneri.includes(id)||s.deti.includes(id)));
  vysledky.push({
    ok: true,
    text: bezSvazku.length+" osob se nevyskytuje v žádném svazku jako partner ani dítě samostatně uvedeny (typicky vzdálení sourozenci bez zapsané rodiny) — model to povoluje."
  });

  // 6) test kruhu (nikdo není sám sobě předkem) — jednoduchá BFS kontrola z kořene
  vysledky.push({ ok:true, text:"Kontrola cyklů: přeskočeno ve fázi 1 (bude součástí layout enginu, fáze 7.2)." });

  return vysledky;
}

const kontroly = zkontrolujData(data);

/* ==========================================================
   VYKRESLENÍ (jen ověřovací výpis, NE finální layout stromu —
   ten je záměrně až fáze 7.2 podle plánu)
   ========================================================== */
function pocetOsob(d){ return Object.keys(d.osoby).length; }
function pocetSvazku(d){ return d.svazky.length; }
function pocetZijicich(d){ return Object.values(d.osoby).filter(o=>!o.umrti).length; }
function pocetNeurcitych(d){ return Object.values(d.osoby).filter(o=>o.narozeni.presnost!=="den").length; }

document.getElementById("statistiky").innerHTML = `
  <div class="stat"><b>${pocetOsob(data)}</b>osob celkem</div>
  <div class="stat"><b>${pocetSvazku(data)}</b>svazků (párů)</div>
  <div class="stat"><b>${pocetZijicich(data)}</b>bez data úmrtí</div>
  <div class="stat"><b>${pocetNeurcitych(data)}</b>s nepřesným/chybějícím datem</div>
`;

document.getElementById("kontrolyVysledek").innerHTML = kontroly.map(k=>
  `<div class="kontrola-radek">${k.ok? "✅":"⚠️"} ${k.text}</div>`
).join("");

function formatDatum(d){
  if(!d) return "?";
  if(d.presnost==="cca") return "cca "+ (d.datum? d.datum.slice(0,4):"?");
  if(d.presnost==="rok") return d.datum;
  return d.datum;
}

function vykresliOsoby(d){
  const radky = Object.entries(d.osoby).map(([id,o])=>{
    const zijici = !o.umrti;
    return `<tr class="${o.pohlavi==='z'?'zena-rad':'muz-rad'} ${zijici?'':'zemrel'}">
      <td>${id}</td>
      <td>${o.jmeno} ${o.prijmeni}${o.rodnePrijmeni? ' <span style="color:#999">(roz. '+o.rodnePrijmeni+')</span>':''}</td>
      <td>${o.pohlavi==='z'?'žena':'muž'}</td>
      <td>*${formatDatum(o.narozeni)}</td>
      <td>${o.umrti? '†'+formatDatum(o.umrti) : (zijici?'':'†?')}</td>
      <td>${o.narozeni.misto||''}</td>
      <td>${o.poznamka? '<span class="pill">pozn.</span>':''}</td>
    </tr>`;
  }).join("");
  document.getElementById("tabulkaOsob").innerHTML =
    `<table><tr><th>ID</th><th>Jméno</th><th>Pohlaví</th><th>Narození</th><th>Úmrtí</th><th>Místo</th><th></th></tr>${radky}</table>`;
}

function vykresliSvazky(d){
  const radky = d.svazky.map(s=>{
    const jmena = id => d.osoby[id]? d.osoby[id].jmeno+" "+d.osoby[id].prijmeni : id+" ⚠️CHYBÍ";
    return `<tr>
      <td>${s.id}</td>
      <td>${s.partneri.map(jmena).join(" & ")}</td>
      <td>${s.typ}${s.od? ' od '+s.od:''}</td>
      <td>${s.deti.length? s.deti.map(jmena).join(", ") : '<span style="color:#999">bez dětí</span>'}</td>
    </tr>`;
  }).join("");
  document.getElementById("tabulkaSvazku").innerHTML =
    `<table><tr><th>ID</th><th>Partneři</th><th>Typ</th><th>Děti</th></tr>${radky}</table>`;
}

vykresliOsoby(data);
vykresliSvazky(data);

document.getElementById("jsonView").value = JSON.stringify(data, null, 2);

function prepniJSON(){
  const el = document.getElementById("jsonView");
  el.style.display = el.style.display==="none" ? "block" : "none";
}

function stahnoutJSON(){
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rodokmen-test-data.json";
  a.click();
}
</script>

</body>
</html>
